<!DOCTYPE html>
<html>
<head>
<title>SentinelShield Login</title>

<style>

body{
background:#081120;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:#101b2d;
padding:40px;
width:350px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,255,255,0.2);
}

h1{
color:#00ffcc;
text-align:center;
margin-bottom:30px;
}

input{
width:100%;
padding:12px;
margin-top:15px;
background:#18283f;
border:none;
border-radius:5px;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:#00ff99;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00cc88;
}

</style>

</head>

<body>

<div class="login-box">

<h1>SentinelShield</h1>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">LOGIN</button>

</form>

</div>

</body>
</html>
