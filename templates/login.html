<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <style>

        body{
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial;
        }

        .login-box{
            background:white;
            padding:40px;
            border-radius:10px;
            width:300px;
            text-align:center;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:#2563eb;
            color:white;
            border:none;
            cursor:pointer;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <h2>Admin Login</h2>

        <form method="POST">

            <input type="text" name="username" placeholder="Username" required>

            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>

        </form>

    </div>

</body>
</html>
